manifest:
  version: "0.1.3"
  schema: https://a2as.org/cert/schema
  subject:
    name: kkdai/linebot-adk-practice
    source: https://github.com/kkdai/linebot-adk-practice
    branch: main
    commit: "5a9bdd24"
    scope: [multi_tool_agent/arxiv_agent.py, main.py]
  issued:
    by: A2AS.org
    at: '2026-02-11T16:45:43Z'
    url: https://a2as.org/certified/agents/kkdai/linebot-adk-practice
  signatures:
    digest: sha256:3uwA1vl4rjtCoEZd6AQfqMnGRZXLIWtXb7qZQAQV5pI
    key: ed25519:wZAs-muUOj8jh0R08Tss0ZVxSnNSqbzGa6Sj3yYB4yY
    sig: ed25519:BmM8_4NwjaHxcvst5ORvylJOEADlgl95TAetSNY5UYdn2qFpyPz46NWIa5nk4XWLDrHVInK1VCoebRzZR9HoDA

agents:
  root_agent:
    type: instance
    models: [gemini-2.0-flash]
    tools: [search_arxiv_papers, summarize_arxiv_paper, answer_paper_question]
    params:
      name: arxiv_agent
      description: Agent specialized in searching arXiv, summarizing papers, and answering questions about them.
      instruction: [You are an AI assistant specializing in interacting with the arXiv repository., 'Users can ask you to:',
        1. Search for papers on arXiv based on a query. Use the `search_arxiv_papers` tool., 2. Summarize a specific arXiv
          paper when given its URL or arXiv ID. Use the `summarize_arxiv_paper` tool. The summary will be the paper's abstract.,
        '3. Answer questions about a specific arXiv paper. Use the `answer_paper_question` tool. This tool will try to find
          relevant information in the paper''s PDF, not just the abstract.', 'When a user provides an arXiv link or ID and
          asks for a summary, use `summarize_arxiv_paper`.', 'When a user provides an arXiv link or ID and asks a specific
          question about it, use `answer_paper_question`.', 'When a user provides a general query for papers, use `search_arxiv_papers`.',
        'When answering a question about a paper, you must be able to find the paper''s PDF URL from either an arXiv ID, an
          arXiv abstract URL (e.g., https://arxiv.org/abs/2506.01943), or a Hugging Face paper URL (e.g., https://huggingface.co/papers/2505.16938).
          The PDF URL is always in the format https://arxiv.org/pdf/<arxiv_id> (e.g., https://arxiv.org/pdf/2506.01943).',
        'Provide clear and concise answers. If a tool returns an error or no information, inform the user politely.', 'When
          providing paper details, always try to include title, authors, summary/abstract, and arXiv ID.', Reply in zh-TW.
          Don't use markdown formatting.]

models:
  gemini-2.0-flash:
    type: literal
    agents: [root_agent]

tools:
  answer_paper_question:
    type: function
    agents: [root_agent]
    params:
      description: |-
        Answers a question about an arXiv paper based on its PDF content.

        Args:
            arxiv_id_or_url: The arXiv ID or URL of the paper.
            question: The question to answer.

        Returns:
            A dictionary with the answer or an error message.
  search_arxiv_papers:
    type: function
    agents: [root_agent]
    params:
      description: |-
        Searches arXiv for papers matching the query.

        Args:
            query: The search query string.

        Returns:
            A dictionary containing the search results or an error message.
  summarize_arxiv_paper:
    type: function
    agents: [root_agent]
    params:
      description: |-
        Fetches and summarizes a specific arXiv paper by its ID or URL.

        Args:
            arxiv_id_or_url: The arXiv ID (e.g., "2303.10130") or URL
                             (e.g., "https://arxiv.org/abs/2303.10130").

        Returns:
            A dictionary containing the paper's details or an error message.

imports:
  Agent: google.adk.agents.Agent
  aiohttp: aiohttp
  AiohttpAsyncHttpClient: linebot.aiohttp_async_http_client.AiohttpAsyncHttpClient
  answer_paper_question: multi_tool_agent.arxiv_agent.answer_paper_question
  arxiv: arxiv
  AsyncLineBotApi: linebot.AsyncLineBotApi
  FastAPI: fastapi.FastAPI
  HTTPException: fastapi.HTTPException
  httpx: httpx
  InMemorySessionService: google.adk.sessions.InMemorySessionService
  InvalidSignatureError: linebot.exceptions.InvalidSignatureError
  io: io
  MessageEvent: linebot.models.MessageEvent
  os: os
  pdfplumber: pdfplumber
  re: re
  Request: fastapi.Request
  Runner: google.adk.runners.Runner
  search_arxiv_papers: multi_tool_agent.arxiv_agent.search_arxiv_papers
  summarize_arxiv_paper: multi_tool_agent.arxiv_agent.summarize_arxiv_paper
  sys: sys
  TextSendMessage: linebot.models.TextSendMessage
  types: google.genai.types
  WebhookParser: linebot.WebhookParser

functions:
  _extract_arxiv_id:
    type: sync
    module: multi_tool_agent.arxiv_agent
    args: [id_or_url]
  answer_paper_question:
    type: sync
    module: multi_tool_agent.arxiv_agent
    args: [arxiv_id_or_url, question]
    params:
      returns: dict
  call_agent_async:
    type: async
    module: main
    args: [query, user_id]
    params:
      returns: str
  get_or_create_session:
    type: async
    module: main
    args: [user_id]
  handle_callback:
    type: async
    module: main
    args: [request]
  search_arxiv_papers:
    type: sync
    module: multi_tool_agent.arxiv_agent
    args: [query]
    params:
      returns: dict
  summarize_arxiv_paper:
    type: sync
    module: multi_tool_agent.arxiv_agent
    args: [arxiv_id_or_url]
    params:
      returns: dict

variables:
  ChannelAccessToken:
    type: env
    params:
      caller: [os.getenv]
      path: [main]
  ChannelSecret:
    type: env
    params:
      caller: [os.getenv]
      path: [main]
  GOOGLE_API_KEY:
    type: env
    params:
      caller: [os.getenv]
      path: [main]
  GOOGLE_CLOUD_LOCATION:
    type: env
    params:
      caller: [os.getenv]
      path: [main]
  GOOGLE_CLOUD_PROJECT:
    type: env
    params:
      caller: [os.getenv]
      path: [main]
  GOOGLE_GENAI_USE_VERTEXAI:
    type: env
    params:
      caller: [os.getenv]
      path: [main]
